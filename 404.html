<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Cubaster</title>
    <style>
        @font-face { font-family: 'Inter'; src: url('/fonts/InterVariable.woff2') format('woff2'); font-weight: 100 900; font-display: swap; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { max-width: 400px; padding: 24px; }
        h1 { font-size: 4rem; font-weight: 800; color: #7c5cff; margin-bottom: 8px; }
        p { color: #9898a8; margin-bottom: 32px; }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: #7c5cff;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        a:hover { background: #6a4ae0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Страница не найдена</p>
        <a href="/">На главную</a>
    </div>
</body>
</html>
